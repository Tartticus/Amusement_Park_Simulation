version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  env_file:
    - .env                             
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-databricks==6.0.0 apache-airflow-providers-snowflake==5.3.0 snowflake-connector-python python-dotenv dbt-snowflake==1.7.4"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - C:\Users\matth\Projects\Amusement_Park_Simulation:/opt/airflow/project
  depends_on:
    - airflow_postgres

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fantasyland_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fantasyland_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fantasyland_kafka_init
    depends_on:
      - kafka
    command: >
      bash -c "sleep 20 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic fantasyland-arrivals &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic fantasyland-transactions &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic fantasyland-performances &&
      echo 'All topics created!' &&
      kafka-topics --bootstrap-server kafka:29092 --list"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fantasyland_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"                   # moved to 8081 — Airflow uses 8080
    environment:
      KAFKA_CLUSTERS_0_NAME: fantasyland
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─────────────────────────────────────────────
  # Airflow — Postgres backend + webserver + scheduler
  # ─────────────────────────────────────────────

  airflow_postgres:
    image: postgres:15
    container_name: fantasyland_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: fantasyland_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Fantasyland \
          --lastname Admin \
          --role Admin \
          --email admin@fantasyland.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: fantasyland_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: fantasyland_airflow_scheduler
    command: scheduler
    depends_on:
      - airflow-init
  grafana:
    image: grafana/grafana:10.4.0
    container_name: fantasyland_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
volumes:
  airflow_pgdata:
  grafana_data: